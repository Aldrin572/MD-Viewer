<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Editor Markdown</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#09090b">
  <!-- Marked.js para compilar Markdown a HTML de forma rápida -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Panel lateral (Menú de archivos) -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h2>Documentos</h2>
        <button id="close-sidebar-btn" class="icon-btn" aria-label="Cerrar menú">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <button id="new-file-btn" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        Nuevo Archivo
      </button>
      <ul id="file-list" class="file-list"></ul>
    </aside>

    <!-- Contenedor Principal -->
    <main id="main-content">
      <header class="app-header">
        <button id="menu-btn" class="icon-btn" aria-label="Abrir menú">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        </button>
        <input type="text" id="current-file-title" class="title-input" value="Sin título" placeholder="Nombre del archivo">
        <button id="delete-file-btn" class="icon-btn danger-btn" aria-label="Eliminar archivo">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
        </button>
      </header>

      <!-- Áreas de trabajo -->
      <section class="editor-container">
        <!-- Input para Markdown -->
        <textarea id="markdown-input" placeholder="Escribe aquí tu código Markdown..."></textarea>
        <!-- Vista previa de HTML (oculta por defecto) -->
        <div id="markdown-preview" class="preview-area hidden"></div>
      </section>

      <!-- Barra de acción inferior -->
      <footer class="action-bar">
        <button id="paste-btn" class="btn btn-action">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>
          Pegar
        </button>
        <button id="toggle-view-btn" class="btn btn-action btn-secondary">
          <span id="toggle-icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
          <span id="toggle-text">Ver Formato</span>
        </button>
      </footer>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
